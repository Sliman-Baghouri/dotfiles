[pyprland]
hyprland_version = "0.53.1"
plugins = ["scratchpads", "expose"]

[expose]
include_special = false

[scratchpads.term]
animation = ""
command = "kitty --class kitty-dropterm"
class = "kitty-dropterm"
position = "20% 20%"
size = "55% 55%"
lazy = true 

[scratchpads.volume]
animation = "fromRight"
command = "pavucontrol"
class = "org.pulseaudio.pavucontrol"
size = "40% 90%"
unfocus = "hide"
lazy = true



[scratchpads.mobile]
command = "scrcpy"
class = "mobile-dropdown"
lazy = true 

[scratchpads.clock]
command = "gnome-clocks"
class = "org.gnome.clocks"
size = "40% 50%"
position = "30% 20%"
lazy = true
unfocus = "hide"
animation = "fromTop"

[scratchpads.note]
command = "kitty --class kitty-note -e sh -c 'nvim ~/temp.txt'"
class = "kitty-note"
size = "40% 40%"
position = "30% 25%"
lazy = true
unfocus = "hide"
animation = "fromTop"
