[pyprland]
plugins = ["scratchpads", "expose"]

[expose]
include_special = false

[scratchpads.term]
animation = ""
command = "kitty --class kitty-dropterm"
class = "kitty-dropterm"
position = "20% 20%"
size = "55% 55%"
lazy = true 

[scratchpads.volume]
animation = "fromRight"
command = "pavucontrol"
class = "org.pulseaudio.pavucontrol"
size = "40% 90%"
unfocus = "hide"
lazy = true



[scratchpads.mobile]
command = "scrcpy"
class = "mobile-dropdown"
lazy = true 

